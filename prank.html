<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>춘식이의 비밀 일기 📝</title>
    <!-- Cute Handwriting Font -->
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --diary-red: #ff7e7e;
            --diary-blue: #7e9fff;
            --paper-bg: #fffcf0;
            --grid-color: #e0d9b4;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            font-family: 'Gaegu', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .diary-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--paper-bg);
            border: 2px solid #ddd;
            border-radius: 10px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
            padding: 30px;
            position: relative;
            box-sizing: border-box;
        }

        /* Grid paper effect */
        .diary-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.3;
            pointer-events: none;
            border-radius: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--diary-red);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .date { color: var(--diary-blue); }
        .weather { color: var(--diary-red); }

        .image-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: white;
            border: 3px solid #555;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .image-box img {
            width: 90%;
            height: auto;
            transform: rotate(-2deg);
        }

        .diary-text {
            line-height: 1.8;
            font-size: 1.5rem;
            text-align: left;
            position: relative;
            z-index: 1;
            word-break: keep-all;
        }

        .highlight {
            color: var(--diary-red);
            font-weight: 700;
            font-size: 1.8rem;
            text-decoration: underline;
        }

        .back-btn {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: var(--diary-blue);
            color: white;
            border: none;
            border-radius: 20px;
            font-family: 'Gaegu', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
            position: relative;
            z-index: 2;
        }

        .back-btn:hover {
            transform: scale(1.05);
        }

        @media (max-width: 400px) {
            .diary-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="diary-container">
        <div class="header">
            <span class="date">4월 1일 금요일</span>
            <span class="weather">날씨 : 선물받기 좋은 날씨☀️</span>
        </div>

        <div class="image-box">
            <img src="./choonsik_prank.png" alt="낚시하는 춘식이">
        </div>

        <div class="diary-text">
            제목 : <span class="highlight">속았지롱! 메롱!</span><br><br>
            오늘 나는 춘식이와 함께 친구를 낚았다.<br>
            친구가 선물을 기대하는 모습이 너무 재미있었다.<br>
            만우절 장난은 정말 정말 즐겁다!<br>
            화내지 말고 다음에 맛있는 거 사줄게!<br><br>
            끝.
        </div>

        <button class="back-btn" onclick="location.href='./index.html'">다시 링크 보내러 가기</button>
    </div>
</body>
</html>
